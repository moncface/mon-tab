<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Generator — Mon [tab]</title>
  <link rel="stylesheet" href="pw-generator.css">
</head>
<body>
  <section class="output">
    <label>Generated Password</label>
    <div class="password-display">
      <span id="password"></span>
      <div class="buttons">
        <button id="regenerate" title="Regenerate">&#x21bb;</button>
        <button id="copy" title="Copy">&#x2398;</button>
      </div>
    </div>
  </section>

  <section class="config">
    <h2>&#x2699; Configuration</h2>
    <div class="slider-row">
      <label for="length">Length</label>
      <span id="length-value" class="length-value">16</span>
    </div>
    <input type="range" id="length" min="4" max="128" value="16">

    <div class="checkboxes">
      <label><input type="checkbox" id="uppercase" checked> Uppercase</label>
      <label><input type="checkbox" id="lowercase" checked> Lowercase</label>
      <label><input type="checkbox" id="numbers" checked> Numbers</label>
      <label><input type="checkbox" id="symbols" checked> Symbols</label>
    </div>
  </section>

  <script src="pw-generator.js"></script>
</body>
</html>
